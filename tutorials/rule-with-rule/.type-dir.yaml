version: 0

entry: root

# Example of passing a rule record via with.
# The docs rule receives the components directory record via with and iterates
# over each component entry to require docs/<name>.md.
rules:
  - rule: root
    ::
      - dir: components
        id: components_root
        ::
          # Splice the component rule and bundle its collected results under id: comp.
          - use: rule.component
            id: comp
      - dir: docs
        ::
          # Pass the components directory record to the docs rule via with.
          - use: rule.docs
            with:
              - id: components_root
                value: ${dir.components_root}
      - file: .type-dir.yaml

  # Capture the name of each directory directly under components/ using named capture `name`.
  - rule: component
    ::
      - dir:
          regex: '^(?<name>.+)$'
        id: component
        ::
          - file: handler.rs

  # Receives the components directory record via with and requires <name>.md for each component.
  - rule: docs
    with:
      - id: components_root
        type: rule.root.dir.components_root
    ::
      - for:
          id: component_entry
          value: ${with.components_root.dir.comp.dir.component}
        ::
          - file: '${value.component_entry.regex.name}.md'
