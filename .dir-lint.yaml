version: 0

entry: root

# target/ is build output. .git is a file in worktrees, so it is not skipped by default and must be excluded explicitly.
ignore:
  - target
  - .git

rules:
  # Enumerate the root with deny-by-default (dirs first, then files).
  - rule: root
    ::
      # Single-package layout: src/ holds the bin crate's modules, tests/ holds integration tests.
      # Both follow the `<base>_tests` dir / `<base>.rs` sibling convention via rule.dir-lint-src.
      - dir: src
        ::
          - use: rule.dir-lint-src
      - dir: tests
        optional: true
        ::
          - use: rule.dir-lint-src
      # tutorials / rule-tests are not inspected for their contents (/* explicitly skips the interior).
      - dir: tutorials/*
      - dir: rule-tests/*
      # docs/ contains 2 books: book-ja (primary) and book (English translation). Collect the set of
      # src/ pages in book-ja and enforce that book/src/ mirrors every page exactly (dogfooding dir-lint).
      - dir: docs
        ::
          - dir: book-ja
            id: book_ja
            ::
              - dir: src
                id: src
                ::
                  - file: SUMMARY.md
                  # Collect *.md pages other than SUMMARY.md (used as the baseline for the book mirror).
                  - file:
                      regex: '^(?<page>.+\.md)$'
                    id: page
                    optional: true
              - file: book.toml
          - dir: book
            ::
              - dir: src
                ::
                  - file: SUMMARY.md
                  # Require a file with the same name as each page collected from book-ja. Because of deny-by-default,
                  # pages present only in book yield LT001, and pages present only in book-ja yield LT002.
                  - for:
                      id: page_entry
                      value: ${dir.book_ja.dir.src.file.page}
                    ::
                      - file: '${value.page_entry.regex.page}'
              - file: book.toml
      # Enumerate the files expected directly under the root.
      - file: Cargo.toml
      - file: Cargo.lock
      - file: .dir-lint.yaml
      - file: .gitignore
      - file: LICENSE
      - file: prek.toml
      - file: README.md

  # Convention for recursively inspecting src/:
  # - If a `<base>_tests` directory exists, a sibling `<base>.rs` must be present.
  # - Otherwise, only .rs files are allowed, and the rule recurses into subdirectories.
  - rule: dir-lint-src
    ::
      # Observe `<base>_tests` directories non-consumingly and capture the base name.
      - fetch:
        id: test_dirs
        ::
          - dir:
              regex: '^(?<base>.+)_tests$'
      # For each observed test directory, require a sibling `<base>.rs` file.
      - for:
          id: test_dir
          value: ${fetch.test_dirs}
        ::
          - file: '${value.test_dir.regex.base}.rs'
      # Allow any subdirectory and recurse into it (optional so that leaf directories with no subdirs also pass).
      - dir:
          regex: '.*'
        optional: true
        ::
          - use: rule.dir-lint-src
      # Allow only .rs files for everything else (the default count for regex is [1,inf], so optional is required).
      - file:
          regex: '.*\.rs$'
        optional: true
